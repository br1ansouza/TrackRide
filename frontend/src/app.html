<!doctype html>
<html lang="pt-BR" data-theme="cerberus">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0770ef" />
		<meta name="description" content="Planeje rotas de moto com análise de clima por trecho" />
		<meta name="mobile-web-app-capable" content="yes" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator && !window.__VITE_HMR_RUNTIME__ && !window.Capacitor) {
				navigator.serviceWorker.register('/sw.js');
			}
		</script>
	</body>
</html>

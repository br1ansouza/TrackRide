version: 2
updates:
  - package-ecosystem: bundler
    directory: "/backend"
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: "/frontend"
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      capacitor:
        patterns:
          - "@capacitor*"
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

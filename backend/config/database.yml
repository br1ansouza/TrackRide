default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: trackride_development
  username: trackride
  password: trackride_dev
  host: localhost
  port: 5432

test:
  <<: *default
  database: trackride_test
  username: trackride
  password: trackride_dev
  host: localhost
  port: 5432

production:
  primary: &primary_production
    <<: *default
    database: trackride_production
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    host: <%= ENV["POSTGRES_HOST"] %>
  cache:
    <<: *primary_production
    database: trackride_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: trackride_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: trackride_production_cable
    migrations_paths: db/cable_migrate

default: &default
  adapter: postgis
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER", "trackride") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "") %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>

development:
  <<: *default
  database: trackride_development

test:
  <<: *default
  database: trackride_test

production:
  primary: &primary_production
    <<: *default
    database: trackride_production
  cache:
    <<: *primary_production
    database: trackride_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: trackride_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: trackride_production_cable
    migrations_paths: db/cable_migrate
